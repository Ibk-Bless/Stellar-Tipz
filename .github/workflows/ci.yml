name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  DESTRUCTIVE_MIGRATION_LABEL: allow-destructive-migration

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acbu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for critical vulnerabilities
        run: |
          pnpm audit --json > audit.json || true
          node <<'NODE'
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const metadataCritical = audit.metadata?.vulnerabilities?.critical;
          const vulnList = audit.vulnerabilities || {};
          const advisoryCritical = Object.values(vulnList).filter(v => v.severity === 'critical').length;
          const criticalCount = metadataCritical ?? advisoryCritical;
          if (criticalCount > 0) {
            console.error(`Critical vulnerabilities found: ${criticalCount}`);
            process.exit(1);
          }
          console.log('No critical vulnerabilities found.');
          NODE

      - name: Gate destructive Prisma migrations
        if: github.event_name == 'pull_request'
        run: node scripts/ci/check-destructive-migrations.js

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Generate Prisma Client
        run: pnpm run prisma:generate

      - name: Apply Prisma migrations
        run: pnpm run prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acbu_test

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acbu_test
          MONGODB_URI: mongodb://localhost:27017/acbu_test
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          JWT_SECRET: test-jwt-secret-for-ci
          API_KEY_SALT: test-api-key-salt

      - name: Build
        run: pnpm run build
