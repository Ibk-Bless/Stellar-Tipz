# Local infrastructure for backend development: PostgreSQL + Redis.
# Usage:  docker compose -f backend/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tipz
      POSTGRES_PASSWORD: tipz
      POSTGRES_DB: tipz
    ports:
      - '5432:5432'
    volumes:
      - tipz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tipz']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - tipz_redisdata:/data

volumes:
  tipz_pgdata:
  tipz_redisdata:
